<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
    <title>ISHGuard Security Agent</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #050A12;
        color: #ffffff;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      #app { height: 100vh; display: flex; flex-direction: column; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      ::selection { background: rgba(255,107,0,0.3); }
      #splash {
        position:fixed;inset:0;z-index:9999;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        background:#050A12;
        transition:opacity 0.5s ease;
      }
      #splash.hidden { opacity:0; pointer-events:none; }
      #splash svg { width:64px; height:64px; margin-bottom:16px; }
      #splash h1 { font-size:20px; font-weight:700; color:#fff; margin-bottom:4px; }
      #splash p { font-size:12px; color:#666; margin-bottom:24px; }
      #splash .bar { width:200px; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
      #splash .bar-fill { height:100%; width:0; background:#FF6B00; border-radius:2px; transition:width 0.3s; }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 512 512" fill="none">
        <path d="M256 32 L448 96 L448 240 C448 352 352 448 256 480 C160 448 64 352 64 240 L64 96 Z" fill="#0B1F3B" stroke="#FF6B00" stroke-width="12"/>
        <text x="256" y="290" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="180" fill="#FF6B00">IS</text>
      </svg>
      <h1>ISHGuard</h1>
      <p>Enterprise AI Security Platform</p>
      <div class="bar"><div class="bar-fill" id="splash-progress"></div></div>
    </div>
    <div id="app"></div>
    <script>
      let p = 0;
      const fp = document.getElementById('splash-progress');
      const iv = setInterval(() => { p += 8; fp.style.width = Math.min(p, 100) + '%'; if (p >= 100) { clearInterval(iv); } }, 40);
    </script>
    <script src="./app.js"></script>
  </body>
</html>
